name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Test syntax
        run: |
          python -m py_compile subenum.py
          echo "Syntax check passed"
          
      - name: Run basic test
        run: |
          python subenum.py --help